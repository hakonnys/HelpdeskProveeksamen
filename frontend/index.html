<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helpdesk Inlogging</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    

    <header class="hovedheader">
        <h1>Helpdesk Inlogging</h1>
    </header>

    <main class="grid">


        <section class="card">
            
            <h2>Logg inn</h2>

            <input id="login_brukernavn" placeholder="Skriv brukernavn..">

            <input id="login_passord" type="password" placeholder="Skriv passord..">


            <button onclick="loggInn()">
                Logg inn
            </button>

            <p id="login_feil"></p>

            
        </section>





        <section class="card">
            <h2>Registrer ny bruker</h2>

            <input id="register_brukernavn" placeholder="Skriv brukernavn..">

            <input id="register_passord" type="password" placeholder="Skriv passord..">
            

            <button onclick="register()">
                Registrer
            </button>

            <p id="register_feil"></p>


        </section>





        <section class="card">
            
            <h2>Registrer ny admin bruker</h2>

            <input id="admin_brukernavn" placeholder="Skriv brukernavn..">

            <input id="admin_passord" type="password" placeholder="Skriv passord..">

            <input id="admin_kode" type="password" placeholder="Skriv hemmelig kode..">



            <button onclick="lagAdmin()">
                Registrer
            </button>

            <p id="admin_feil"></p>

            
        </section>









    </main>


<script>

const API_BASE ="http://192.168.1.10:8000";



async function loggInn() {

    const brukernavn = document.getElementById("login_brukernavn").value.trim();
    const passord = document.getElementById("login_passord").value.trim();

    const feil = document.getElementById("login_feil");

    feil.textContent = "";


    if (!brukernavn || !passord) {
        feil.textContent = "Vennligst fyll ut alle felt.";
        return;
    }



    try {
        const response = await fetch(`${API_BASE}/registeradmin`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({username: brukernavn, password: passord, hemmelig_kode: kode})
        });

        const data = await response.json();

        if (!response.ok) {
            feil.textContent = data.detail;
            return;
        }

        feil.style.color = "green";
        feil.textContent = "Admin Opprettet";
    }

    catch (error) {
        feil.textContent = "Kunne ikke koble til serveren.";
    }
}



async function register() {

    const brukernavn = document.getElementById("register_brukernavn").value.trim();
    const passord = document.getElementById("register_passord").value.trim();

    const feil = document.getElementById("register_feil");

    feil.textContent = "";

    if (!brukernavn || !passord) {
        feil.textContent = "Vennligst fyll ut alle felt,";
        return
    }

    try {
        const response = await fetch(`${API_BASE}/register`, {

            method: "POST", 

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({username: brukernavn, password: passord, role: "user" })

        });

        const data = await response.json();

        if (!response.ok) {
            feil.textContent = data.detail
            return;
        }

        feil.style.color = "green";
        feil.textContent = "Bruker registert"

    }

    catch (error) {
        feil.textContent = "Kunne ikke koble til serveren.";
    }
    
}



async function lagAdmin() {

    const brukernavn = document.getElementById("admin_brukernavn").value.trim();
    const passord = document.getElementById("admin_passord").value.trim();
    const kode = document.getElementById("admin_kode").value.trim();

    const feil = document.getElementById("admin_feil");

    feil.textContent ="";

    if (!brukernavn || !passord || !kode) {
        feil.textContent = "Fyll ut alle felt.";
        return;
    }


    try {
        const response = await fetch(`${API_BASE}/registeradmin`, {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({username: brukernavn, password: passord, role: "user" })

        });

        const data = await response.json();

        if (!response.ok) {
            feil.textContent= data.detail;
            return;
        }

        feil.style.color = "green";
        feil.textContent= "Admin Opprettet"
    }

    catch (error) {
        feil.textContent = "Kunne ikke koble til serveren.";
    }

}
    
















</script>


</body>
</html>
